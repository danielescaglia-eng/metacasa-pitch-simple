<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaCasa CRM — Investor Leads</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--purple:#7A00DF;--cyan:#06B6D4;--dark:#0F0F1A;--card:#161625;--white:#f0f0f5;--gray:#ABB8C3;--muted:#6b6b80;--green:#00D084;--red:#ef4444;--border:rgba(122,0,223,0.12)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}

        /* Auth screen */
        #authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
        .auth-box{background:#14142a;border:1px solid rgba(122,0,223,0.25);border-radius:20px;padding:2.5rem;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(122,0,223,0.15)}
        .auth-box h2{font-family:'Space Grotesk';font-size:1.3rem;font-weight:800;margin-bottom:0.3rem}
        .auth-box p{font-size:0.82rem;color:var(--muted);margin-bottom:1.5rem}
        .auth-input{width:100%;background:#1a1a30;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.7rem 1rem;color:var(--white);font-size:0.9rem;font-family:'Inter';outline:none;text-align:center;letter-spacing:3px}
        .auth-input:focus{border-color:var(--purple)}
        .auth-btn{width:100%;margin-top:0.8rem;padding:0.8rem;background:linear-gradient(135deg,#7A00DF,#06B6D4);border:none;border-radius:8px;color:white;font-weight:700;font-family:'Space Grotesk';cursor:pointer;font-size:0.9rem}
        .auth-err{color:#ef4444;font-size:0.75rem;margin-top:0.5rem;display:none}

        /* CRM Dashboard */
        #crmScreen{display:none;padding:2rem}
        .crm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
        .crm-logo{font-family:'Space Grotesk';font-size:1.2rem;font-weight:800}
        .crm-logo span{background:linear-gradient(135deg,#7A00DF,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

        /* Stats row */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center}
        .stat-card .val{font-family:'Space Grotesk';font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#7A00DF,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stat-card .lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:0.2rem}

        /* Table */
        .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
        .table-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border)}
        .table-header h3{font-family:'Space Grotesk';font-size:0.95rem;font-weight:700}
        .export-btn{background:none;border:1px solid var(--border);color:var(--gray);border-radius:6px;padding:0.3rem 0.8rem;font-size:0.72rem;cursor:pointer;font-family:'Space Grotesk';font-weight:600;transition:all 0.2s}
        .export-btn:hover{border-color:var(--purple);color:var(--white)}

        table{width:100%;border-collapse:collapse}
        thead th{padding:0.7rem 1rem;text-align:left;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border)}
        tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s}
        tbody tr:hover{background:rgba(122,0,223,0.04)}
        tbody tr:last-child{border-bottom:none}
        tbody td{padding:0.8rem 1rem;font-size:0.82rem}

        .role-badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;font-family:'Space Grotesk'}
        .role-investor{background:rgba(122,0,223,0.12);color:var(--purple)}
        .role-angel{background:rgba(6,182,212,0.12);color:var(--cyan)}
        .role-partner{background:rgba(0,208,132,0.12);color:var(--green)}
        .role-advisor{background:rgba(255,255,255,0.06);color:var(--gray)}
        .role-other{background:rgba(255,255,255,0.04);color:var(--muted)}

        .views-bar{display:flex;align-items:center;gap:0.5rem}
        .views-dots{display:flex;gap:2px}
        .views-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
        .views-dot.active{background:var(--purple)}

        .empty-state{text-align:center;padding:4rem 2rem}
        .empty-state p{color:var(--muted);font-size:0.88rem}

        .clear-btn{background:none;border:none;color:var(--muted);font-size:0.72rem;cursor:pointer;text-decoration:underline;font-family:'Inter'}
        .clear-btn:hover{color:var(--red)}

        @media(max-width:768px){
            .stats-row{grid-template-columns:1fr 1fr}
            table{font-size:0.75rem}
            .crm-header{flex-direction:column;align-items:flex-start}
        }
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
    <div class="auth-box">
        <div style="margin-bottom:1rem;font-size:1.8rem">🔐</div>
        <h2>MetaCasa <span style="background:linear-gradient(135deg,#7A00DF,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CRM</span></h2>
        <p>Dashboard lead investitori — accesso riservato</p>
        <input type="password" id="pwInput" class="auth-input" placeholder="••••••••" autocomplete="off">
        <button class="auth-btn" id="authBtn">Accedi</button>
        <p class="auth-err" id="authErr">Password errata</p>
    </div>
</div>

<!-- CRM DASHBOARD -->
<div id="crmScreen">
    <div class="crm-header">
        <div>
            <div class="crm-logo">META<span>CASA</span> — Investor CRM</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:0.2rem">Lead registrati dalla pitch page v2</div>
        </div>
        <div style="display:flex;gap:0.8rem;align-items:center">
            <button class="clear-btn" id="clearBtn">🗑 Svuota dati demo</button>
            <button class="export-btn" id="exportBtn">⬇ Esporta CSV</button>
            <button class="export-btn" id="logoutBtn" style="border-color:rgba(239,68,68,0.3);color:var(--muted)">Esci</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card"><div class="val" id="s_total">0</div><div class="lbl">Lead totali</div></div>
        <div class="stat-card"><div class="val" id="s_views">0</div><div class="lbl">Visualizzazioni</div></div>
        <div class="stat-card"><div class="val" id="s_investors">0</div><div class="lbl">Investitori / VC</div></div>
        <div class="stat-card"><div class="val" id="s_today">0</div><div class="lbl">Nuovi oggi</div></div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <div class="table-header">
            <h3>📋 Tutti i Lead</h3>
            <span style="font-size:0.72rem;color:var(--muted)">Dati salvati in localStorage del dispositivo</span>
        </div>
        <div id="tableContainer"></div>
    </div>
</div>

<script>
const CRM_PW     = 'metacasa2026';
const LEADS_KEY  = 'mc_leads';
const AUTH_KEY   = 'mc_crm_auth';

// Auth
document.getElementById('authBtn').addEventListener('click', tryAuth);
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') tryAuth(); });

function tryAuth(){
    const pw = document.getElementById('pwInput').value;
    if(pw === CRM_PW){
        sessionStorage.setItem(AUTH_KEY, '1');
        showCRM();
    } else {
        document.getElementById('authErr').style.display = 'block';
        document.getElementById('pwInput').value = '';
    }
}

function showCRM(){
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('crmScreen').style.display  = 'block';
    renderDashboard();
}

// Check session
if(sessionStorage.getItem(AUTH_KEY) === '1') showCRM();

function getLeads(){
    try{ return JSON.parse(localStorage.getItem(LEADS_KEY))||[]; } catch{ return []; }
}

function renderDashboard(){
    const leads = getLeads();
    const today = new Date().toDateString();

    // Stats
    const totalViews    = leads.reduce((s,l) => s + (l.views||0), 0);
    const investors     = leads.filter(l => l.role === 'investor' || l.role === 'angel').length;
    const todayLeads    = leads.filter(l => new Date(l.registeredAt).toDateString() === today).length;

    document.getElementById('s_total').textContent     = leads.length;
    document.getElementById('s_views').textContent     = totalViews;
    document.getElementById('s_investors').textContent = investors;
    document.getElementById('s_today').textContent     = todayLeads;

    // Table
    const container = document.getElementById('tableContainer');
    if(!leads.length){
        container.innerHTML = '<div class="empty-state"><p>Nessun lead ancora. Condividi la pitch page per raccogliere dati.</p></div>';
        return;
    }

    const roleLabel = {investor:'Investitore',angel:'Business Angel',partner:'Partner',advisor:'Advisor',other:'Altro',''  : '—'};
    const roleClass = {investor:'role-investor',angel:'role-angel',partner:'role-partner',advisor:'role-advisor',other:'role-other',''  :'role-other'};

    const sorted = [...leads].sort((a,b) => new Date(b.lastViewAt) - new Date(a.lastViewAt));

    const rows = sorted.map(l => {
        const dots = Math.min(l.views||0, 10);
        const dotHtml = Array.from({length:10}, (_,i) =>
            `<span class="views-dot${i < dots ? ' active':''}"></span>`
        ).join('');
        const reg = new Date(l.registeredAt).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
        const last = new Date(l.lastViewAt).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<tr>
            <td><strong>${escHtml(l.name||'—')}</strong></td>
            <td style="color:var(--cyan)">${escHtml(l.email||'—')}</td>
            <td style="color:var(--gray)">${escHtml(l.company||'—')}</td>
            <td><span class="role-badge ${roleClass[l.role]||'role-other'}">${roleLabel[l.role]||l.role||'—'}</span></td>
            <td>
                <div class="views-bar">
                    <strong style="font-family:'Space Grotesk';font-size:0.88rem">${l.views||0}</strong>
                    <div class="views-dots">${dotHtml}</div>
                </div>
            </td>
            <td style="color:var(--muted);font-size:0.75rem">${reg}</td>
            <td style="color:var(--muted);font-size:0.75rem">${last}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
        <table>
            <thead><tr>
                <th>Nome</th><th>Email</th><th>Azienda</th><th>Ruolo</th>
                <th>Visualizzazioni</th><th>Registrato</th><th>Ultima visita</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Export CSV
document.getElementById('exportBtn').addEventListener('click', () => {
    const leads = getLeads();
    if(!leads.length){ alert('Nessun lead da esportare.'); return; }
    const header = 'Nome,Email,Azienda,Ruolo,Visualizzazioni,Registrato,Ultima visita\n';
    const rows = leads.map(l =>
        [l.name,l.email,l.company,l.role,l.views,l.registeredAt,l.lastViewAt]
        .map(v => `"${(v||'').toString().replace(/"/g,'""')}"`)
        .join(',')
    ).join('\n');
    const blob = new Blob([header+rows], {type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'metacasa-leads.csv'; a.click();
    URL.revokeObjectURL(url);
});

// Clear demo
document.getElementById('clearBtn').addEventListener('click', () => {
    if(confirm('Sicuro di voler eliminare tutti i dati? Questa azione è irreversibile.')){
        localStorage.removeItem(LEADS_KEY);
        renderDashboard();
    }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem(AUTH_KEY);
    location.reload();
});
</script>

</body>
</html>
